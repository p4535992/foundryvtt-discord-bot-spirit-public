
# PostgreSQL datasource (Docker network default host: foundry01db)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${SPIRIT_DB_JDBC_URL:jdbc:postgresql://${SPIRIT_DB_HOST:foundry01db}:${SPIRIT_DB_PORT:5432}/${SPIRIT_DB_NAME:${POSTGRES_SPIRIT_DB_NAME:foundryvttspirit01}}}
%dev.quarkus.datasource.jdbc.url=${SPIRIT_DB_JDBC_URL:jdbc:postgresql://${SPIRIT_DB_HOST:localhost}:${SPIRIT_DB_PORT:5432}/${SPIRIT_DB_NAME:${POSTGRES_SPIRIT_DB_NAME:foundryvttspirit01}}}
quarkus.datasource.username=${SPIRIT_DB_USER:${POSTGRES_SPIRIT_DB_USER:foundryvttspirit}}
quarkus.datasource.password=${SPIRIT_DB_PASS:${POSTGRES_SPIRIT_DB_PASS:}}

# ORM/Liquibase baseline
quarkus.hibernate-orm.database.generation=none
quarkus.liquibase.migrate-at-start=true
quarkus.liquibase.change-log=config/liquibase/master.xml
